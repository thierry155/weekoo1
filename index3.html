<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week-end chaud !!! - Burundi</title>
<style>
  body, html { margin:0; padding:0; font-family: Arial, sans-serif; height:100%; overflow:hidden; }
  canvas { position:absolute; top:0; left:0; z-index:-1; }
  .container {
    position: relative; z-index: 1;
    background: rgba(255,255,255,0.9);
    padding:30px; border:4px solid #ff0000; border-radius:15px;
    width:90%; max-width:400px; text-align:center;
    box-shadow:0 6px 15px rgba(0,0,0,0.3);
    animation: pop 1s ease-out; margin:20px auto;
  }
  @keyframes pop {0%{transform:scale(0.7);opacity:0;}100%{transform:scale(1);opacity:1;}}
  @keyframes pulse {0%{transform:scale(1);}50%{transform:scale(1.1);}100%{transform:scale(1);}}
  @keyframes swing {0%{transform:translateX(0);}50%{transform:translateX(20px);}100%{transform:translateX(0);}}
  .photo {width:100px;height:100px;border-radius:50%;border:4px solid #008000;object-fit:cover;margin-bottom:15px;
    animation: pulse 2s infinite, swing 3s ease-in-out infinite;}
  h1 {color:#008000;font-size:22px;margin-bottom:20px;}
  input {padding:12px;margin:10px 0;width:100%;font-size:16px;box-sizing:border-box;border:2px solid #ff0000;border-radius:5px;}
  button {padding:12px;font-size:16px;cursor:pointer;background:linear-gradient(90deg,#008000,#ff0000);
    color:white;border:none;border-radius:5px;width:100%;font-weight:bold;transition:transform 0.2s;}
  button:hover {transform:scale(1.05);}
  #message {margin-top:20px;font-size:18px;font-weight:bold;background:rgba(255,255,255,0.8);
    padding:10px 15px;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,0.2);
    transition:all 0.5s ease-in-out;opacity:0;}
  #message.show {opacity:1;transform:translateY(0);}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="container">
  <img src="WIN_20260302_09_49_49_Pro.jpg" alt="Ma photo" class="photo">
  <h1>Week-end chaud !!!</h1>
  <input type="text" id="name" placeholder="Ton prénom" />
  <input type="text" id="activity" placeholder="Saisis ton activité du week-end" />
  <button onclick="showMessage()">Valider</button>
  <p id="message"></p>
</div>

<script>
const googleSheetURL = 'https://script.google.com/macros/s/AKfycbwPkY2-T0pLkoAbDKOPDjAJ9DWi_wuyd7rxgBOrnpFjEew613rVfyh0HBEBJGyg5miRKA/exec';

function showMessage() {
  const name = document.getElementById('name').value.trim();
  const activity = document.getElementById('activity').value.trim();

  if(!name || !activity){
    alert("Merci de remplir ton nom et saisir ton activité !");
    return;
  }

  // Couleur remarquable aléatoire pour l'activité
  const colors = ['#1E90FF','#FF8C00','#32CD32','#9400D3','#FF1493','#FF4500','#00CED1'];
  const color = colors[Math.floor(Math.random()*colors.length)];

  // Affichage du message avec l'activité en couleur
  const msg = document.getElementById('message');
  msg.innerHTML = `Salut ${name} ! Ce week-end, tu vas te concentrer sur <span style="color:${color}; font-weight:bold;">${activity}</span>. Amuse-toi bien ! 🎉`;
  msg.classList.remove('show');
  setTimeout(()=>msg.classList.add('show'),10);

  // Envoi des données au Google Sheet
  fetch(googleSheetURL,{
    method:'POST',
    body: JSON.stringify({nom: name, activite: activity})
  })
  .then(response=>response.json())
  .then(data=>console.log('Données envoyées', data))
  .catch(err=>console.error('Erreur lors de l\'envoi', err));
}

// Canvas animé
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let gradientOffset = 0;
function draw(){
  gradientOffset+=0.005;
  const gradient = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
  gradient.addColorStop(0 + Math.sin(gradientOffset)/2,'#ff0000');
  gradient.addColorStop(0.5 + Math.sin(gradientOffset)/4,'#ffffff');
  gradient.addColorStop(1 + Math.sin(gradientOffset)/2,'#008000');
  ctx.fillStyle = gradient;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  requestAnimationFrame(draw);
}
draw();
window.addEventListener('resize',()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
